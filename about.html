    <title>ABOUT ME | 雪碧の私库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f2f2f0;
            color: #111;
            padding: 12rem 5vw 6rem;
            line-height: 1.7;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;

            padding: 2rem 0;
            background-color: rgba(242, 242, 240, 0.85);

            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #000;
            transform: translateY(-2px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 1.2rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { gap: 8vw; padding: 1.5rem 0; }
            nav a { font-size: 1rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
