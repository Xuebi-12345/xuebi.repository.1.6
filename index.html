<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪碧の私库 | Personal Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f2f2f0;
            color: #111;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12vw;
            padding: 2rem 0;
            background-color: rgba(242, 242, 240, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #000;
            transform: translateY(-2px);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5vw;
            padding-top: 8rem;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 1400px;
            aspect-ratio: 16 / 10;
            border-radius: 16px;
            overflow: hidden;
            background-color: #d1d0cd;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .text-line {
            position: absolute;
            font-size: 5vw;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            background: linear-gradient(90deg, #000 0%, #999 50%, #000 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: flowGradient 4s linear infinite;
        }

        .text-line.personal {
            top: 38%;
            left: 8%;
        }

        .text-line.works {
            top: 52%;
            right: 12%;
            animation-delay: 0.5s;
        }

        @keyframes flowGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @media (max-width: 768px) {
            nav { gap: 8vw; padding: 1.5rem 0; }
            nav a { font-size: 1rem; }
            .text-line { font-size: 8vw; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="about.html">ABOUT ME</a>
        <a href="works.html">WORKS</a>
        <a href="index.html">HOME</a>
    </nav>

    <section class="hero">
        <div class="hero-image-wrapper">
        
            <!-- ====================== -->
            <!-- ✅ 图片位置在这里！！！ -->
            <!-- ====================== -->
            <img class="hero-image" src="首页0.png">

            <div class="text-overlay">
                <div class="text-line personal">PERSONAL</div>
                <div class="text-line works">WORKS</div>
            </div>
        </div>
    </section>
</body>
</html>
